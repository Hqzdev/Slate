services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: slate
      POSTGRES_PASSWORD: slate
      POSTGRES_USER: slate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slate -d slate"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - slate-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"
    volumes:
      - slate-redis:/data

volumes:
  slate-postgres:
  slate-redis:
