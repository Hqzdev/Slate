services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: slate
      POSTGRES_PASSWORD: slate
      POSTGRES_USER: slate
    ports:
      - "5432:5432"
    volumes:
      - slate-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - slate-redis:/data

volumes:
  slate-postgres:
  slate-redis:
